<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Translator</title>
  
  <!-- PWA Meta -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0b0f19">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Live Translator">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="description" content="Free real-time voice translator supporting 10+ languages with speech-to-text, text-to-speech, and walkie-talkie mode.">
  
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Decorative Background Blobs -->
  <div class="blob-1"></div>
  <div class="blob-2"></div>
  <div class="blob-3"></div>

  <!-- Audio Visualizer (Background) -->
  <canvas id="audio-visualizer"></canvas>

  <!-- Main App Container -->
  <main class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-top">
        <h1>Live Translator</h1>
        <div class="mode-toggle-container">
          <span class="toggle-label active" id="label-standard">Standard</span>
          <label class="switch">
            <input type="checkbox" id="mode-toggle">
            <span class="slider round"></span>
          </label>
          <span class="toggle-label" id="label-wt">Walkie-Talkie</span>
        </div>
        <button id="menu-btn" class="menu-btn" title="Saved Phrases" aria-expanded="false" aria-controls="favorites-drawer" aria-label="Toggle Saved Phrases Drawer">
          📁 Saved Phrases
        </button>
        <button id="open-drawer-btn" style="position: absolute; top: 0; left: 0; width: 5px; height: 5px; opacity: 0.01; border: none; background: transparent; padding: 0; margin: 0; pointer-events: auto;" aria-label="Open Saved Phrases Drawer"></button>
      </div>
      <p>Speak in one language, read in another.</p>
    </header>

    <!-- Language Selectors (Shared between modes) -->
    <section class="shared-controls">
      <div class="lang-selectors">
        <div class="selector-group">
          <label for="source-lang">Person A Language</label>
          <select id="source-lang">
            <option value="en-US">English (US)</option>
            <option value="es-ES">Spanish</option>
            <option value="fr-FR">French</option>
            <option value="de-DE">German</option>
            <option value="it-IT">Italian</option>
            <option value="ja-JP">Japanese</option>
            <option value="ko-KR">Korean</option>
            <option value="zh-CN">Chinese (Simplified)</option>
          </select>
        </div>
        
        <div class="icon-swap">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 3L21 8L16 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M21 8H7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M8 21L3 16L8 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 16H17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="selector-group">
          <label for="target-lang">Person B Language</label>
          <select id="target-lang">
            <option value="es-ES">Spanish</option>
            <option value="en-US">English (US)</option>
            <option value="fr-FR">French</option>
            <option value="de-DE">German</option>
            <option value="it-IT">Italian</option>
            <option value="ja-JP">Japanese</option>
            <option value="ko-KR">Korean</option>
            <option value="zh-CN">Chinese (Simplified)</option>
          </select>
        </div>
      </div>
      
      <!-- Speech Speed Slider Container (R1) -->
      <div class="speed-control-container">
        <div class="speed-control-header">
          <label for="speed-slider">Speech Speed</label>
          <span id="speed-value">0.85x</span>
        </div>
        <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.05" value="0.85">
      </div>
    </section>

    <!-- STANDARD MODE CONTAINER -->
    <div id="standard-mode-container">
      <section class="controls-section">
        <div class="action-buttons">
          <button id="start-btn" class="btn primary-btn">
            Start Translation
          </button>
          <button id="stop-btn" class="btn secondary-btn" disabled>
            Stop
          </button>
        </div>
      </section>

      <section class="results-section">
        <div class="result-card">
          <h2>Transcript</h2>
          <div id="transcript-box" class="content-box">
            <p class="placeholder-text">Listening will appear here...</p>
          </div>
        </div>
        
        <div class="result-card highlight">
          <h2>Translation</h2>
          <div class="content-box-wrapper">
            <div id="translated-box" class="content-box">
              <p class="placeholder-text">Translation will appear here...</p>
            </div>
            <!-- Quick Actions -->
            <div class="quick-actions">
              <button id="save-favorite-btn" class="icon-btn" title="Save Phrase" aria-label="Save current translation to favorites">⭐ Save</button>
              <button id="copy-btn" class="icon-btn" title="Copy to Clipboard">📋 Copy</button>
              <button id="share-btn" class="icon-btn" title="Share">🔗 Share</button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- WALKIE-TALKIE MODE CONTAINER -->
    <div id="walkie-talkie-container" style="display: none;">
      <div class="wt-layout">
        <!-- Person A Pane -->
        <div class="wt-pane person-a-pane">
          <h2 id="wt-name-a">Person A (English)</h2>
          <div class="wt-transcript-container">
            <div class="wt-subtext">Translated to:</div>
            <div id="wt-transcript-a" class="wt-text">Waiting...</div>
          </div>
          <button id="wt-start-a" class="btn primary-btn wt-btn">
            Hold to Speak
          </button>
        </div>
        
        <!-- Divider -->
        <div class="wt-divider"></div>

        <!-- Person B Pane -->
        <div class="wt-pane person-b-pane">
          <h2 id="wt-name-b">Person B (Spanish)</h2>
          <button id="wt-start-b" class="btn primary-btn wt-btn wt-b-btn">
            Hold to Speak
          </button>
          <div class="wt-transcript-container">
            <div class="wt-subtext">Translated to:</div>
            <div id="wt-transcript-b" class="wt-text">Waiting...</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Drawer Overlay -->
  <div id="drawer-overlay" class="drawer-overlay" aria-hidden="true"></div>

  <!-- Favorites Drawer -->
  <aside id="favorites-drawer" class="favorites-drawer" aria-labelledby="drawer-title" aria-hidden="true" role="complementary">
    <div class="drawer-header">
      <h2 id="drawer-title">Saved Phrases</h2>
      <button id="close-drawer-btn" class="close-btn" aria-label="Close Saved Phrases Drawer">&times;</button>
    </div>
    <div class="drawer-content">
      <!-- Drawer Tabs -->
      <div class="drawer-tabs">
        <button class="drawer-tab active" data-tab="favorites">⭐ Favorites</button>
        <button class="drawer-tab" data-tab="phrasebook">📖 Phrasebook</button>
      </div>

      <!-- Favorites Tab -->
      <div id="tab-favorites" class="tab-panel active">
        <ul id="favorites-list">
          <!-- Rendered dynamically -->
        </ul>
      </div>

      <!-- Phrasebook Tab -->
      <div id="tab-phrasebook" class="tab-panel">
        <div id="phrasebook-categories">
          <!-- Rendered dynamically from phrasebook.js -->
        </div>
      </div>
    </div>
  </aside>

  <script src="js/languages.js"></script>
  <script src="js/phrasebook.js"></script>
  <script src="js/visualizer.js"></script>
  <script src="js/stt.js"></script>
  <script src="js/tts.js"></script>
  <script src="js/app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
