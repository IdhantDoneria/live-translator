<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Translator</title>
  
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Decorative Background Blobs -->
  <div class="blob-1"></div>
  <div class="blob-2"></div>
  <div class="blob-3"></div>

  <!-- Audio Visualizer (Background) -->
  <canvas id="audio-visualizer"></canvas>

  <!-- Main App Container -->
  <main class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-top">
        <h1>Live Translator</h1>
        <div class="mode-toggle-container">
          <span class="toggle-label active" id="label-standard">Standard</span>
          <label class="switch">
            <input type="checkbox" id="mode-toggle">
            <span class="slider round"></span>
          </label>
          <span class="toggle-label" id="label-wt">Walkie-Talkie</span>
        </div>
      </div>
      <p>Speak in one language, read in another.</p>
    </header>

    <!-- Language Selectors (Shared between modes) -->
    <section class="shared-controls">
      <div class="lang-selectors">
        <div class="selector-group">
          <label for="source-lang">Person A Language</label>
          <select id="source-lang">
            <option value="en-US">English (US)</option>
            <option value="es-ES">Spanish</option>
            <option value="fr-FR">French</option>
            <option value="de-DE">German</option>
            <option value="it-IT">Italian</option>
            <option value="ja-JP">Japanese</option>
            <option value="ko-KR">Korean</option>
            <option value="zh-CN">Chinese (Simplified)</option>
          </select>
        </div>
        
        <div class="icon-swap">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 3L21 8L16 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M21 8H7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M8 21L3 16L8 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 16H17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="selector-group">
          <label for="target-lang">Person B Language</label>
          <select id="target-lang">
            <option value="es-ES">Spanish</option>
            <option value="en-US">English (US)</option>
            <option value="fr-FR">French</option>
            <option value="de-DE">German</option>
            <option value="it-IT">Italian</option>
            <option value="ja-JP">Japanese</option>
            <option value="ko-KR">Korean</option>
            <option value="zh-CN">Chinese (Simplified)</option>
          </select>
        </div>
      </div>
    </section>

    <!-- STANDARD MODE CONTAINER -->
    <div id="standard-mode-container">
      <section class="controls-section">
        <div class="action-buttons">
          <button id="start-btn" class="btn primary-btn">
            Start Translation
          </button>
          <button id="stop-btn" class="btn secondary-btn" disabled>
            Stop
          </button>
        </div>
      </section>

      <section class="results-section">
        <div class="result-card">
          <h2>Transcript</h2>
          <div id="transcript-box" class="content-box">
            <p class="placeholder-text">Listening will appear here...</p>
          </div>
        </div>
        
        <div class="result-card highlight">
          <h2>Translation</h2>
          <div class="content-box-wrapper">
            <div id="translated-box" class="content-box">
              <p class="placeholder-text">Translation will appear here...</p>
            </div>
            <!-- Quick Actions -->
            <div class="quick-actions">
              <button id="copy-btn" class="icon-btn" title="Copy to Clipboard">📋 Copy</button>
              <button id="share-btn" class="icon-btn" title="Share">🔗 Share</button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- WALKIE-TALKIE MODE CONTAINER -->
    <div id="walkie-talkie-container" style="display: none;">
      <div class="wt-layout">
        <!-- Person A Pane -->
        <div class="wt-pane person-a-pane">
          <h2 id="wt-name-a">Person A (English)</h2>
          <div class="wt-transcript-container">
            <div class="wt-subtext">Translated to:</div>
            <div id="wt-transcript-a" class="wt-text">Waiting...</div>
          </div>
          <button id="wt-start-a" class="btn primary-btn wt-btn">
            Hold to Speak
          </button>
        </div>
        
        <!-- Divider -->
        <div class="wt-divider"></div>

        <!-- Person B Pane -->
        <div class="wt-pane person-b-pane">
          <h2 id="wt-name-b">Person B (Spanish)</h2>
          <button id="wt-start-b" class="btn primary-btn wt-btn wt-b-btn">
            Hold to Speak
          </button>
          <div class="wt-transcript-container">
            <div class="wt-subtext">Translated to:</div>
            <div id="wt-transcript-b" class="wt-text">Waiting...</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/languages.js"></script>
  <script src="js/visualizer.js"></script>
  <script src="js/stt.js"></script>
  <script src="js/tts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
